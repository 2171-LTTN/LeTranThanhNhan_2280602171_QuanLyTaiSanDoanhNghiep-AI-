spring.application.name=quanlytaisan

# MongoDB Configuration
# For local MongoDB:
# spring.data.mongodb.uri=mongodb://localhost:27017/quanlytaisan

# For MongoDB Atlas (replace with your connection string):
spring.data.mongodb.uri=mongodb+srv://username:password@cluster.mongodb.net/quanlytaisan?retryWrites=true&w=majority

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong!!
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.lttn=DEBUG
