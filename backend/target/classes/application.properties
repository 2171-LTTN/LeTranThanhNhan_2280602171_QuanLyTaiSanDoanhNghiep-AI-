spring.application.name=quanlytaisan

# MongoDB Configuration
# For local MongoDB:
# spring.data.mongodb.uri=mongodb://localhost:27017/quanlytaisan

# For MongoDB Atlas (replace with your connection string):
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/quanlytaisan}

# Server Configuration
server.port=${SERVER_PORT:8080}

# JWT Configuration (use environment variable in production)
jwt.secret=${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging (INFO for production, DEBUG for development)
spring.profiles.active=${SPRING_PROFILES:dev}
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.lttn=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
