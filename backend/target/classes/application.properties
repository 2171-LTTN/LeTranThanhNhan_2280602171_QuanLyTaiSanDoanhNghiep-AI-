spring.application.name=quanlytaisan

# MongoDB Configuration
# For local MongoDB:
# spring.data.mongodb.uri=mongodb://localhost:27017/quanlytaisan

# For MongoDB Atlas (replace with your connection string):
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/quanlytaisan}

# Server Configuration
server.port=${SERVER_PORT:8080}

# JWT Configuration — MUST be set via environment variable; no default
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration — MUST be set via environment variable; no default
cors.allowed-origins=${CORS_ORIGINS:}

# Logging (INFO for production, DEBUG for development)
spring.profiles.active=${SPRING_PROFILES:}
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.lttn=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
